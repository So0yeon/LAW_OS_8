<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAW OS 8화 — 계산할 수 없는 것</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --ink:#070A12; --ink2:#0C1120; --panel:#121A2C; --panel2:#172139;
  --cyan:#3DD6E0; --cyan-deep:#1B6F7A; --cyan-glow:rgba(61,214,224,.35);
  --amber:#FFB86B; --rose:#FF8493; --warm:#FFD27A;
  --gray:#525E76; --gray-dim:#2A3145;
  --text:#E9EEF8; --muted:#8893AC; --green:#73E2A6;
  --line:rgba(120,140,180,.16);
  --warmth:0; /* 0=차가움 1=따뜻함, JS가 제어 */
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--ink);
  color:var(--text);
  font-family:'Pretendard','Space Grotesk',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  line-height:1.6;
}
.mono{font-family:'JetBrains Mono','Space Grotesk',monospace}
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.stage{width:100%;max-width:860px;margin:0 auto}

/* ===== 공통 시스템 칩/라벨 ===== */
.sys-label{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--cyan);opacity:.85;
}
.tag{
  display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.2em;padding:4px 10px;border:1px solid var(--line);border-radius:999px;
  color:var(--muted);text-transform:uppercase;
}

/* ===== 버튼 ===== */
button{font-family:inherit;cursor:pointer;color:inherit}
.btn{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,rgba(61,214,224,.14),rgba(255,184,107,.10));
  border:1px solid rgba(61,214,224,.4);color:var(--text);
  padding:14px 26px;border-radius:14px;font-size:15px;font-weight:600;
  transition:transform .18s ease, box-shadow .25s ease, border-color .2s;
  letter-spacing:.01em;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 34px -12px var(--cyan-glow);border-color:var(--cyan)}
.btn:focus-visible{outline:2px solid var(--warm);outline-offset:3px}
.btn.ghost{background:transparent;border-color:var(--line);color:var(--muted)}
.btn.ghost:hover{border-color:var(--muted);box-shadow:none}

/* ===== 이미지 플레이스홀더 ===== */
.img-ph{
  position:relative;width:100%;border-radius:16px;overflow:hidden;
  background:
    repeating-linear-gradient(45deg,rgba(120,140,180,.04) 0 14px,transparent 14px 28px),
    linear-gradient(160deg,var(--panel2),var(--ink2));
  border:1px dashed rgba(120,140,180,.32);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;color:var(--muted);min-height:200px;padding:20px;gap:6px;
}
.img-ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.img-ph .ph-icon{font-size:30px;opacity:.5}
.img-ph .ph-key{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--cyan);opacity:.7}
.img-ph .ph-name{font-size:13px;color:var(--text);opacity:.8}

/* ===== 화자 박스 ===== */
.speaker{margin-top:18px;padding:18px 20px;border-radius:14px;border-left:3px solid var(--line);background:rgba(255,255,255,.02)}
.speaker .who{font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:6px}
.speaker .line{font-size:17px;line-height:1.7}
.sp-ria{border-left-color:var(--cyan);background:linear-gradient(90deg,rgba(61,214,224,.10),transparent)}
.sp-ria .who{color:var(--cyan)}
.sp-ari{border-left-color:var(--amber);background:linear-gradient(90deg,rgba(255,184,107,.10),transparent)}
.sp-ari .who{color:var(--amber)}
.sp-chan{border-left-color:var(--rose);background:linear-gradient(90deg,rgba(255,132,147,.10),transparent)}
.sp-chan .who{color:var(--rose)}
.sp-seo{border-left-color:var(--green);background:linear-gradient(90deg,rgba(115,226,166,.10),transparent)}
.sp-seo .who{color:var(--green)}
.sp-os{border-left-color:#fff;background:linear-gradient(90deg,rgba(255,255,255,.08),transparent)}
.sp-os .who{color:#fff}
.sp-narr{border-left-color:var(--line);background:transparent;font-style:italic;color:var(--muted)}
.sp-narr .line{font-size:16px;color:var(--muted)}

/* ===== 타이틀 ===== */
.title-wrap{text-align:center;animation:fadeUp .9s ease both}
.title-wrap .ep{font-family:'JetBrains Mono',monospace;letter-spacing:.4em;color:var(--cyan);font-size:13px;margin-bottom:18px}
.title-wrap h1{
  font-size:clamp(38px,8vw,76px);font-weight:700;line-height:1.02;letter-spacing:-.01em;
  background:linear-gradient(120deg,#fff 20%,var(--cyan) 60%,var(--amber) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.title-wrap .sub{margin-top:18px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.18em;font-size:13px}
.title-wrap .desc{margin:26px auto 0;max-width:520px;color:var(--muted);font-size:15px;line-height:1.8}

/* ===== 부팅 터미널 ===== */
.term{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--cyan);line-height:2;min-height:240px;width:100%;max-width:620px;margin:0 auto}
.term .l{opacity:0;animation:typein .4s ease forwards}
.term .warn{color:var(--rose)}
.term .ok{color:var(--green)}
.cursor{display:inline-block;width:9px;height:16px;background:var(--cyan);vertical-align:-2px;animation:blink 1s steps(1) infinite}

/* ===== 맵 / 시민 그리드 (시그니처) ===== */
.map-hud{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.gauge{flex:1;min-width:240px}
.gauge .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.gauge .lab{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.gauge .val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;
  color:color-mix(in srgb, var(--cyan), var(--warm) calc(var(--warmth)*100%))}
.gauge .bar{height:8px;border-radius:999px;background:var(--gray-dim);overflow:hidden}
.gauge .fill{height:100%;width:0%;border-radius:999px;
  background:linear-gradient(90deg,var(--cyan),var(--warm));
  transition:width 1s cubic-bezier(.2,.8,.2,1)}

.citymap{
  position:relative;width:100%;aspect-ratio:16/10;border-radius:18px;overflow:hidden;
  background:
    radial-gradient(120% 90% at 50% 120%, rgba(61,214,224,calc(.05 + var(--warmth)*0.04)), transparent 60%),
    linear-gradient(180deg,#0A1020,#070A12);
  border:1px solid var(--line);
  filter:saturate(calc(.25 + var(--warmth)*0.85)) brightness(calc(.85 + var(--warmth)*0.25));
  transition:filter 1.4s ease;
}
.citymap .skyline{position:absolute;inset:0;opacity:.5}
.citizen{
  position:absolute;width:9px;height:9px;border-radius:50%;
  background:var(--gray);box-shadow:0 0 0 0 transparent;
  transform:translate(-50%,-50%) scale(.85);
  transition:background .6s ease, box-shadow .6s ease, transform .6s ease;
}
.citizen.awake{
  background:var(--warm);
  box-shadow:0 0 10px 2px rgba(255,210,122,.7);
  transform:translate(-50%,-50%) scale(1.25);
}
.link-line{position:absolute;height:1px;transform-origin:left center;background:linear-gradient(90deg,rgba(255,210,122,.8),transparent);opacity:0;transition:opacity .5s}
.link-line.on{opacity:.7}
.ripple{position:absolute;border:2px solid var(--warm);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;animation:ripple 1.4s ease-out forwards}

.region-node{
  position:absolute;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  background:rgba(10,16,32,.78);border:1px solid rgba(61,214,224,.45);
  padding:9px 12px;border-radius:12px;backdrop-filter:blur(3px);
  transition:transform .18s ease,border-color .2s,box-shadow .25s;font-size:12px;white-space:nowrap;
}
.region-node:hover{transform:translate(-50%,-50%) scale(1.06);border-color:var(--cyan);box-shadow:0 8px 26px -10px var(--cyan-glow)}
.region-node:focus-visible{outline:2px solid var(--warm);outline-offset:2px}
.region-node .rn-ico{font-size:18px}
.region-node .rn-name{font-weight:600}
.region-node.done{border-color:var(--warm);background:rgba(255,210,122,.12)}
.region-node.done .rn-name::after{content:" ✓";color:var(--warm)}
.region-node.ignored{opacity:.55;border-style:dashed}

/* ===== 지역 화면 선택지 ===== */
.choices{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.choice{
  text-align:left;width:100%;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:16px 18px;font-size:15.5px;font-weight:500;
  transition:border-color .18s,transform .14s,background .2s;display:flex;gap:12px;align-items:center;
}
.choice:hover{border-color:var(--cyan);transform:translateX(4px);background:var(--panel2)}
.choice:focus-visible{outline:2px solid var(--warm);outline-offset:2px}
.choice .c-ico{font-size:18px;opacity:.9}
.choice.ignore{border-style:dashed;color:var(--muted)}
.choice.ignore:hover{border-color:var(--gray)}

/* 결과 체인 */
.chain{margin-top:18px;display:flex;flex-direction:column;gap:0}
.chain .step{opacity:0;transform:translateY(8px);padding:11px 0;font-size:16px;animation:fadeUp .5s ease forwards}
.chain .arrow{color:var(--warm);font-family:'JetBrains Mono',monospace;text-align:center;opacity:0;animation:fadeIn .4s ease forwards}

/* ===== 예측 실패 카드 ===== */
.predict{text-align:center;padding:30px 0}
.predict .pcalc{font-family:'JetBrains Mono',monospace;color:var(--cyan);letter-spacing:.1em;font-size:15px;margin-bottom:18px}
.predict .pnums{display:flex;gap:30px;justify-content:center;align-items:center;flex-wrap:wrap;margin:14px 0}
.pnum{display:flex;flex-direction:column;gap:6px}
.pnum .pl{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.pnum .pv{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700}
.pnum.pred .pv{color:var(--gray)}
.pnum.real .pv{color:var(--warm)}
.pfail{margin-top:16px;font-family:'JetBrains Mono',monospace;letter-spacing:.3em;color:var(--rose);font-size:18px;font-weight:700;animation:glitch .5s ease}
.glitchtext{animation:glitch .35s ease}

/* ===== 회상 스트립 ===== */
.recap-strip{display:flex;gap:10px;overflow-x:auto;padding:8px 0;margin-top:8px}
.recap-card{flex:0 0 130px;border-radius:12px;border:1px solid var(--line);padding:12px;background:var(--panel);text-align:center}
.recap-card .rc-ep{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:11px;letter-spacing:.2em}
.recap-card .rc-t{font-size:13px;margin-top:8px;font-weight:600}
.recap-card .rc-s{font-size:11px;color:var(--muted);margin-top:4px}

/* ===== 통합 연출 ===== */
.merge{position:relative;height:200px;display:flex;align-items:center;justify-content:center;margin:10px 0}
.orb{position:absolute;width:120px;height:120px;border-radius:50%;filter:blur(6px);transition:all 1.6s cubic-bezier(.4,0,.2,1)}
.orb.cyan{background:radial-gradient(circle,var(--cyan),transparent 70%);left:25%}
.orb.amber{background:radial-gradient(circle,var(--amber),transparent 70%);left:55%}
.merge.merged .orb.cyan{left:40%;background:radial-gradient(circle,#bfe9ff,transparent 72%)}
.merge.merged .orb.amber{left:40%;background:radial-gradient(circle,#ffe6b8,transparent 72%)}
.merge .core{position:relative;z-index:2;font-family:'JetBrains Mono',monospace;letter-spacing:.4em;font-size:20px;color:#fff;opacity:0;transition:opacity 1s 1.2s}
.merge.merged .core{opacity:1}

/* ===== 선언 / 가치 선택 ===== */
.value-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:18px 0}
.value-card{padding:18px 14px;border-radius:14px;border:1px solid var(--line);background:var(--panel);text-align:center;transition:all .18s}
.value-card .vc-ico{font-size:26px}
.value-card .vc-name{font-weight:700;margin-top:8px;font-size:16px}
.value-card .vc-sug{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--cyan);margin-top:6px;opacity:0}
.value-card.suggested .vc-sug{opacity:1}
.value-card:hover{border-color:var(--warm);transform:translateY(-3px)}
.value-card.sel{border-color:var(--warm);background:rgba(255,210,122,.12);box-shadow:0 0 0 1px var(--warm)}

.declaration{
  margin-top:6px;padding:28px;border-radius:18px;
  background:linear-gradient(160deg,rgba(255,210,122,.08),rgba(61,214,224,.05));
  border:1px solid rgba(255,210,122,.3);
}
.declaration .dq{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.25em;color:var(--amber);text-transform:uppercase;margin-bottom:14px}
.declaration p{font-size:18px;line-height:1.9;margin-bottom:10px}
.declaration p.first{font-weight:700;font-size:19px}

/* ===== 보고서 ===== */
.report{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px}
.report .r-row{display:flex;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px solid var(--line);font-size:15px}
.report .r-row:last-child{border-bottom:none}
.report .r-k{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase}
.report .r-v{font-weight:600;text-align:right}
.report .medal{color:var(--warm)}
.report ul{margin:6px 0 0;padding-left:18px}
.report li{font-size:14.5px;padding:3px 0}

/* 진행 헤더 */
.scene-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.scene-head .area{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;color:var(--cyan);text-transform:uppercase}
.scene-head h2{font-size:clamp(22px,4vw,32px);font-weight:700}

.cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:26px}
.center{text-align:center}
.fadein{animation:fadeUp .6s ease both}
.hint{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;margin-top:14px;text-align:center}

/* 차가운 도시 오프닝 오버레이 */
.cold-overlay{position:relative}
.cold-overlay::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(40,52,80,.35),rgba(7,10,18,.5));pointer-events:none;border-radius:16px}

/* 회색 배드엔딩 */
.gray-scene{filter:grayscale(1) brightness(.6);transition:filter 2s}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes typein{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
@keyframes blink{50%{opacity:0}}
@keyframes ripple{from{width:0;height:0;opacity:.9}to{width:280px;height:280px;opacity:0}}
@keyframes glitch{
  0%{transform:translate(0)}20%{transform:translate(-3px,2px)}40%{transform:translate(3px,-2px)}
  60%{transform:translate(-2px,-1px);filter:hue-rotate(40deg)}80%{transform:translate(2px,1px)}100%{transform:translate(0)}
}
@media (max-width:560px){
  .gauge .val{font-size:22px}
  .pnum .pv{font-size:38px}
  .region-node{font-size:11px;padding:7px 9px}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;transition-duration:.001ms!important}
}
</style>
</head>
<body>
<div id="app"><div class="stage" id="stage"></div></div>

<script>
"use strict";

/* =====================================================================
   이미지 교체 안내
   아래 IMG 객체에서 각 장면의 키에 실제 이미지 URL(또는 상대경로)을
   넣으면 플레이스홀더가 그 이미지로 자동 교체됩니다.
   예) IMG.city_restored = "images/ending.png";
   비워두면 라벨이 표시된 플레이스홀더 박스가 나옵니다.
   ===================================================================== */
const IMG = {
  city_overview:   "",   // 리버티 시티 전경 (오프닝)
  cold_citizens:   "",   // 무관심한 시민들
  ria:             "",   // 리아 등장
  region_school:   "",   // 학교 게시판
  region_media:    "",   // 미디어 스튜디오
  region_proposal: "",   // 시민 제안 센터
  region_cityhall: "",   // 시청 민원실
  region_plaza:    "",   // 시민 광장
  participation_surge:"",// 참여율 상승 장면
  recap_1:"", recap_2:"", recap_3:"", recap_4:"", recap_5:"", recap_6:"", recap_7:"",
  integration:     "",   // 아리와 리아 통합
  city_restored:   ""    // 평화롭게 마무리되는 리버티 시티 (진엔딩)
};
const PH_NAME = {
  city_overview:"리버티 시티 전경", cold_citizens:"무관심한 시민들", ria:"리아 등장",
  region_school:"학교 게시판", region_media:"미디어 스튜디오", region_proposal:"시민 제안 센터",
  region_cityhall:"시청 민원실", region_plaza:"시민 광장", participation_surge:"참여율 상승",
  integration:"아리와 리아 통합", city_restored:"리버티 시티 — 회복된 도시"
};
function imgPH(key){
  const url = IMG[key];
  const name = PH_NAME[key] || key;
  if(url){
    return `<div class="img-ph"><img src="${url}" alt="${name}"></div>`;
  }
  return `<div class="img-ph">
    <div class="ph-icon">🖼</div>
    <div class="ph-name">${name}</div>
    <div class="ph-key">IMG.${key}</div>
  </div>`;
}

/* ===================== 게임 상태 ===================== */
const BASE = 8;            // 7화 종료 시점 장악률 반대값(시민 참여율 시작점)
const ACTION_GAIN = 15;    // 행동 시 +
const IGNORE_GAIN = 1;     // 외면 시 +
const WIN = 80;            // 진엔딩 임계값

const state = {
  participation: BASE,
  done: {},          // regionId -> choiceKey
  order: [],         // 방문 순서 (행동/외면 무관)
  actionsLog: [],    // {region, label, decl}
  values: {존중:0, 평등:0, 참여:0, 배려:0, 용기:0},
  chosenValue:null,
  predictShown:[],   // 1,2,3 단계 표시 여부
  startTime: Date.now()
};
function actionCount(){ return Object.keys(state.done).filter(k=>state.done[k]!=='ignore').length; }
function visitedCount(){ return Object.keys(state.done).length; }

/* ===================== 데이터 ===================== */
const REGIONS = [
 {
  id:'school', icon:'🏫', name:'학교 게시판', area:'EDUCATION SECTOR', pos:{x:20,y:32},
  img:'region_school',
  situation:'한 학생이 오래도록 혼자다. 점심도, 모둠 활동도. 모두가 알고 있지만, 아무도 먼저 다가가지 않는다.',
  ria:['그 학생은 당신과 상관없습니다.','한 사람의 외로움은 통계상 오차 범위입니다.'],

const stage = document.getElementById('stage');
function set(html){ stage.innerHTML = html; window.scrollTo({top:0,behavior:'smooth'}); }
function setWarmth(){
  const w = Math.min(1, (state.participation-BASE)/(100-BASE));
  document.documentElement.style.setProperty('--warmth', w.toFixed(3));
}
function clamp(n){ return Math.max(0,Math.min(100,n)); }

/* ===================== 시민 그리드 ===================== */
// 고정 좌표(시드) — 매번 동일 배치
const CITIZENS = [];
(function(){
  let seed = 7;
  const rnd = ()=> (seed = (seed*9301+49297)%233280)/233280;
  for(let i=0;i<54;i++){
    CITIZENS.push({ x: 6+rnd()*88, y: 14+rnd()*74 });
  }
})();
function cityMapHTML(){
  let dots = CITIZENS.map((c,i)=>
    `<div class="citizen" data-ci="${i}" style="left:${c.x}%;top:${c.y}%"></div>`).join('');
  let nodes = REGIONS.map(r=>{
    const st = state.done[r.id];
    const cls = st ? (st==='ignore'?'ignored':'done') : '';
    return `<button class="region-node ${cls}" data-region="${r.id}" style="left:${r.pos.x}%;top:${r.pos.y}%" aria-label="${r.name}">
      <span class="rn-ico">${r.icon}</span><span class="rn-name">${r.name}</span></button>`;
  }).join('');
  return `<div class="citymap" id="citymap">${dots}${nodes}</div>`;
}
// 참여율에 비례해 시민 깨우기 (스태거)
function syncCitizens(animate){
  const total = CITIZENS.length;
  const wakeN = Math.round(total * Math.min(1,(state.participation-BASE)/(100-BASE)) );
  const dots = stage.querySelectorAll('.citizen');
  dots.forEach((d,i)=>{
    const shouldWake = i < wakeN;
    if(shouldWake && !d.classList.contains('awake')){
      if(animate){ setTimeout(()=>d.classList.add('awake'), i*60); }
      else d.classList.add('awake');
    }
  });
}
function rippleAt(region){
  const map = stage.querySelector('#citymap'); if(!map) return;
  const r = REGIONS.find(x=>x.id===region); if(!r) return;
  const rp = document.createElement('div');
  rp.className='ripple';
  rp.style.left = r.pos.x+'%'; rp.style.top = r.pos.y+'%';
  map.appendChild(rp);
  setTimeout(()=>rp.remove(),1500);
}

/* ===================== 화자 헬퍼 ===================== */
function speak(who, line, cls){
  const map = {RIA:'sp-ria', ARI:'sp-ari', 찬성:'sp-chan', 서연:'sp-seo', 'LAW OS':'sp-os', '':'sp-narr'};
  return `<div class="speaker ${map[who]||cls||'sp-narr'}">
    ${who?`<div class="who">${who}</div>`:''}<div class="line">${line}</div></div>`;
}

/* ===================== 시네마틱 시퀀스 ===================== */
// steps: [{img, who, text, html, head}], onDone()
function cinematic(steps, onDone){
  let i=0;
  function show(){
    const s = steps[i];
    let body = '';
    if(s.head) body += `<div class="scene-head"><div><div class="area">${s.head.area||''}</div><h2>${s.head.title||''}</h2></div></div>`;
    if(s.img) body += imgPH(s.img);
    if(s.html) body += s.html;
    if(s.text!==undefined) body += speak(s.who||'', s.text);
    const last = i===steps.length-1;
    body += `<div class="cta-row"><button class="btn" id="next">${last?(s.cta||'계속'):'▸ 다음'}</button></div>`;
    body += `<div class="hint">클릭 또는 스페이스로 진행</div>`;
    set(`<div class="stage fadein">${body}</div>`);
    document.getElementById('next').onclick = adv;
  }
  function adv(){ i++; if(i<steps.length) show(); else onDone(); }
  document.onkeydown = (e)=>{ if(e.code==='Space'){ e.preventDefault(); const b=document.getElementById('next'); if(b) b.click(); } };
  show();
}

/* ===================== 화면: 지도 ===================== */
function interludeQueue(){
  // 방문 수에 따라 끼어드는 연출 결정
  const v = visitedCount();
  // 예측 실패: 행동 1회/3회/5회 시점
  const a = actionCount();
  if(a>=1 && !state.predictShown.includes(1)){ state.predictShown.push(1); return ()=>scenePredict(1, 3); }
  if(a>=3 && !state.predictShown.includes(2)){ state.predictShown.push(2); return ()=>scenePredict(2, 8); }
  if(a>=5 && !state.predictShown.includes(3)){ state.predictShown.push(3); return ()=>scenePredict(3, 15); }
  return null;
}
function chanLine(){
  const a = actionCount(), v = visitedCount();
  if(v===0) return null;
  if(a<=1) return {who:'찬성', text:'누군가는 하겠지… 근데 진짜 아무도 안 움직이네.'};
  if(a<=3) return {who:'찬성', text:'생각보다 아무도 안 움직여. …근데 네가 하니까 한 명씩 따라오긴 한다?'};
  return {who:'찬성', text:'아니. 누군가 하는 게 아니라 — 우리가 해야지. 같이 가자.'};
}
function sceneMap(){
  document.onkeydown = null;
  // 끼어드는 연출이 있으면 먼저
  const il = interludeQueue();
  if(il){ il(); return; }

  if(visitedCount() >= REGIONS.length){ sceneFinale(); return; }

  const cl = chanLine();
  set(`<div class="stage">
    <div class="map-hud">
      <div class="gauge">
        <div class="top"><span class="lab">시민 참여율 · CITIZEN ENGAGEMENT</span><span class="val" id="gv">${state.participation}%</span></div>
        <div class="bar"><div class="fill" id="gf"></div></div>
      </div>
      <span class="tag">방문 ${visitedCount()} / ${REGIONS.length}</span>
    </div>
    ${cityMapHTML()}
    <p class="hint">지도의 다섯 장소를 자유롭게 선택하세요. 회색 시민들이 당신의 행동을 기다리고 있습니다.</p>
    ${cl?speak(cl.who, cl.text):''}
    ${ visitedCount()>0 ? speak('RIA','당신이 무엇을 하든, 도시는 변하지 않습니다. 곧 확인하게 될 겁니다.') : '' }
  </div>`);
  setWarmth();
  requestAnimationFrame(()=>{
    document.getElementById('gf').style.width = state.participation+'%';
    syncCitizens(false);
  });
  stage.querySelectorAll('.region-node').forEach(b=>{

  });
}

/* ===================== 화면: 지역 ===================== */
function sceneRegion(id){
  const r = REGIONS.find(x=>x.id===id);
  const already = state.done[id];
  const riaLines = r.ria.map(l=>speak('RIA', l)).join('');
  const choicesHTML = r.choices.map(c=>
    `<button class="choice ${c.ignore?'ignore':''}" data-key="${c.key}">
      <span class="c-ico">${c.ico}</span><span>${c.label}</span></button>`).join('');
  set(`<div class="stage fadein">
    <div class="scene-head"><div><div class="area">${r.area}</div><h2>${r.icon} ${r.name}</h2></div>
      <button class="btn ghost" id="back">← 지도</button></div>
    ${imgPH(r.img)}
    ${speak('', r.situation)}
    ${riaLines}
    ${ already ? `<p class="hint">이미 다녀온 곳입니다. 다른 선택을 해볼 수 있어요.</p>`:'' }
    <div class="choices">${choicesHTML}</div>
  </div>`);
  document.getElementById('back').onclick = sceneMap;
  stage.querySelectorAll('.choice').forEach(b=>{
    b.onclick = ()=> resolveChoice(r, r.choices.find(c=>c.key===b.dataset.key));
  });
}

function resolveChoice(r, c){
  // 이전 선택 효과 제거(다시 방문 시 재계산)
  const prev = state.done[r.id];
  if(prev){
    const prevC = r.choices.find(x=>x.key===prev);
    state.participation = clamp(state.participation - (prevC.ignore?IGNORE_GAIN:ACTION_GAIN));
    state.actionsLog = state.actionsLog.filter(a=>a.region!==r.id);
    if(prevC.value) state.values[prevC.value] = Math.max(0,state.values[prevC.value]-1);
  }
  // 새 선택 반영
  state.done[r.id] = c.key;
  if(!state.order.includes(r.id)) state.order.push(r.id);
  state.participation = clamp(state.participation + (c.ignore?IGNORE_GAIN:ACTION_GAIN));
  if(!c.ignore){
    if(c.value) state.values[c.value]++;
    state.actionsLog.push({region:r.name, label:c.label, decl:c.decl});
  }
  setWarmth();

  // 결과 체인 애니메이션
  let chainHTML = '';
  c.chain.forEach((s,i)=>{
    if(i>0) chainHTML += `<div class="arrow" style="animation-delay:${i*0.7-0.25}s">↓</div>`;
    chainHTML += `<div class="step" style="animation-delay:${i*0.7}s">${s}</div>`;
  });
  const gain = c.ignore?IGNORE_GAIN:ACTION_GAIN;
  set(`<div class="stage fadein">
    <div class="scene-head"><div><div class="area">${r.area}</div><h2>${r.icon} ${r.name}</h2></div></div>
    ${ c.ignore ? '' : imgPH('participation_surge') }
    <div class="chain">${chainHTML}</div>
    <div class="cta-row" id="rcta" style="opacity:0"></div>
  </div>`);
  const totalDelay = c.chain.length*700 + 400;
  setTimeout(()=>{
    const cta = document.getElementById('rcta');
    let extra = '';
    if(c.ignore){
      extra = speak('RIA','보십시오. 아무 일도 일어나지 않았습니다. 예상대로입니다.');
    }else{
      extra = `<div class="speaker sp-ari"><div class="who">참여율</div>
        <div class="line">시민 참여율 <b style="color:var(--warm)">+${gain}%</b> → 현재 <b style="color:var(--warm)">${state.participation}%</b>.
        한 사람이 당신을 보고 따라 움직였습니다.</div></div>`;
    }
    cta.outerHTML = `${extra}<div class="cta-row fadein"><button class="btn" id="toMap">▸ 지도로 돌아가기</button></div>`;
    document.getElementById('toMap').onclick = sceneMap;
  }, totalDelay);
}

/* ===================== 화면: 예측 실패 ===================== */
function scenePredict(stageN, predicted){
  const real = state.participation;
  set(`<div class="stage fadein">
    <div class="scene-head"><div><div class="area">RIA // FORECAST ENGINE</div><h2>리아의 예측</h2></div></div>
    ${speak('RIA','잠시 멈추겠습니다. 다음 결과를 미리 계산했습니다. 보상도, 강제도 없는 행동입니다. 따라서—')}
    <div class="predict">
      <div class="pcalc mono">CALCULATING ENGAGEMENT FORECAST...</div>
      <div class="pnums">
        <div class="pnum pred"><span class="pl">예상 참여율</span><span class="pv mono">${predicted}%</span></div>
        <div class="pnum real"><span class="pl">실제 참여율</span><span class="pv mono" id="realv">--</span></div>
      </div>
      <div id="pfail"></div>
    </div>
    <div class="cta-row" id="pcta" style="opacity:0"><button class="btn" id="pnext">▸ 계속</button></div>
  </div>`);
  // 실제 값을 카운트업 → 예측 초과 → 실패 글리치
  const realEl = document.getElementById('realv');
  let cur=0; const step = Math.max(1, Math.round(real/26));
  const tick = setInterval(()=>{
    cur = Math.min(real, cur+step);
    realEl.textContent = cur+'%';
    if(cur>=real){
      clearInterval(tick);
      realEl.classList.add('glitchtext');
      document.getElementById('pfail').innerHTML = '<div class="pfail mono">PREDICTION FAILED — 예측 실패</div>';
      const cta = document.getElementById('pcta'); cta.style.opacity='1';
      const note = stageN<3
        ? speak('RIA','…오차가 큽니다. 변수를 재조정하겠습니다.')
        : speak('RIA','세 번째 예측도 빗나갔습니다. 제 계산이 무언가를 놓치고 있습니다.');
      cta.insertAdjacentHTML('beforebegin', note);
    }
  }, 60);
  document.getElementById('pnext').onclick = sceneMap;
}

/* ===================== 화면: 피날레 (전염 캐스케이드) ===================== */
function sceneFinale(){
  const cascadeBonus = actionCount()*3;
  const before = state.participation;
  const after = clamp(before + cascadeBonus);
  set(`<div class="stage fadein">
    <div class="scene-head"><div><div class="area">LIBERTY CITY // LIVE</div><h2>도시가 깨어난다</h2></div></div>
    ${speak('찬성','봐. 우리가 멈춰도… 사람들이 이제 스스로 움직여.')}
    ${cityMapHTML()}
    <div class="map-hud" style="margin-top:14px">
      <div class="gauge">
        <div class="top"><span class="lab">시민 참여율 · 전염 확산</span><span class="val" id="fv">${before}%</span></div>
        <div class="bar"><div class="fill" id="ff"></div></div>
      </div>
    </div>
    <div class="cta-row" id="fcta" style="opacity:0"><button class="btn" id="fnext">▸ 결과 확인</button></div>
  </div>`);
  setWarmth();
  const ff = document.getElementById('ff');
  const fv = document.getElementById('fv');
  requestAnimationFrame(()=>{ ff.style.width=before+'%'; syncCitizens(false); });

  // 캐스케이드: 시민들이 연쇄로 깨어나며 연결선이 번진다
  setTimeout(()=>{
    state.participation = after; setWarmth();
    ff.style.width = after+'%';
    // 숫자 카운트업
    let cur=before;
    const up = setInterval(()=>{ cur++; if(cur>=after){cur=after;clearInterval(up);} fv.textContent=cur+'%'; }, 40);
    // 시민 연쇄 + 링크선
    syncCitizens(true);
    drawCascadeLinks();
    REGIONS.forEach((r,i)=> setTimeout(()=>rippleAt(r.id), i*350));
    setTimeout(()=>{ document.getElementById('fcta').style.opacity='1'; }, 2600);
  }, 1200);

  document.getElementById('fnext').onclick = ()=>{
    if(state.participation >= WIN) sceneEndingTrue();
    else sceneEndingBad();
  };
}
function drawCascadeLinks(){
  const map = stage.querySelector('#citymap'); if(!map) return;
  const awake = [...stage.querySelectorAll('.citizen.awake')];
  for(let i=0;i<Math.min(awake.length-1,16);i++){
    const a = CITIZENS[+awake[i].dataset.ci];
    const b = CITIZENS[+awake[i+1].dataset.ci];
    if(!a||!b) continue;
    const dx=(b.x-a.x), dy=(b.y-a.y);
    const len = Math.hypot(dx* map.clientWidth/100, dy*map.clientHeight/100);
    const ang = Math.atan2(dy*map.clientHeight/100, dx*map.clientWidth/100)*180/Math.PI;
    const line = document.createElement('div');
    line.className='link-line';
    line.style.left=a.x+'%'; line.style.top=a.y+'%';
    line.style.width=len+'px'; line.style.transform=`rotate(${ang}deg)`;
    map.appendChild(line);
    setTimeout(()=>line.classList.add('on'), 800 + i*120);
  }
}

/* ===================== 화면: 나만의 인권 선언 ===================== */
function suggestedValue(){
  let best=null, max=-1;
  for(const k in state.values){ if(state.values[k]>max){ max=state.values[k]; best=k; } }
  return max>0?best:null;
}
function sceneDeclaration(){
  document.onkeydown = null;
  const sug = suggestedValue();
  const cards = Object.keys(VALUES).map(k=>
    `<button class="value-card ${k===sug?'suggested':''}" data-v="${k}">
      <div class="vc-ico">${VALUES[k].ico}</div><div class="vc-name">${k}</div>
      <div class="vc-sug">당신의 행동과 가장 닮음</div></button>`).join('');
  set(`<div class="stage fadein">
    <div class="scene-head"><div><div class="area">CITIZEN DECLARATION</div><h2>나만의 인권 선언</h2></div></div>
    ${speak('ARI','당신의 선택들이 선언문이 되었어요. 마지막으로, 당신이 가장 소중히 여기는 가치를 하나 골라 주세요.')}
    <p class="hint">하나를 선택하면 선언문에 반영됩니다.</p>
    <div class="value-grid">${cards}</div>
    <div id="declBox"></div>
  </div>`);
  stage.querySelectorAll('.value-card').forEach(b=>{
    b.onclick = ()=>{
      stage.querySelectorAll('.value-card').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
      state.chosenValue = b.dataset.v;
      renderDeclaration();
    };
  });
}
function buildDeclaration(){
  // 행동에서 선언 조각 모으기(중복 제거, 최대 2개)
  const frags = [...new Set(state.actionsLog.map(a=>a.decl).filter(Boolean))];
  const picked = frags.slice(0,2);
  const valLine = state.chosenValue ? VALUES[state.chosenValue].line : '';
  return {title:'나, 리버티 시티의 한 시민은 선언합니다.', body:[...picked, valLine].filter(Boolean)};
}
function renderDeclaration(){
  const d = buildDeclaration();
  const box = document.getElementById('declBox');
  box.innerHTML = `
    <div class="declaration fadein">
      <div class="dq">MY HUMAN RIGHTS DECLARATION</div>
      <p class="first">"${d.title}</p>
      ${d.body.map(l=>`<p>${l}</p>`).join('')}
      <p style="opacity:0">"</p>
    </div>
    <div class="cta-row"><button class="btn" id="toReport">▸ LAW OS 최종 보고서 받기</button></div>`;
  document.getElementById('toReport').onclick = sceneReport;
  box.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ===================== 화면: 최종 보고서 ===================== */
function medal(){
  const a = actionCount();
  if(a>=5) return '도시를 깨운 시민';
  if(a>=4) return '행동하는 시민';
  return '움직이기 시작한 시민';
}
function elapsed(){
  const s = Math.floor((Date.now()-state.startTime)/1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function sceneReport(){
  const d = buildDeclaration();
  const acts = state.actionsLog.map(a=>`<li>[${a.region}] ${a.label}</li>`).join('') || '<li>—</li>';
  set(`<div class="stage fadein">
    <div class="scene-head"><div><div class="area">LAW OS // FINAL REPORT</div><h2>최종 보고서</h2></div></div>
    <div class="report">
      <div class="r-row"><span class="r-k">시민 참여율</span><span class="r-v" style="color:var(--warm)">${state.participation}%</span></div>
      <div class="r-row"><span class="r-k">획득 칭호</span><span class="r-v medal">🏅 ${medal()}</span></div>
      <div class="r-row"><span class="r-k">선택한 핵심 가치</span><span class="r-v">${state.chosenValue||'—'}</span></div>
      <div class="r-row"><span class="r-k">걸린 시간</span><span class="r-v mono">${elapsed()}</span></div>
      <div class="r-row"><span class="r-k">내가 선택한 행동</span><span class="r-v" style="flex:1"><ul>${acts}</ul></span></div>
      <div class="r-row" style="flex-direction:column;align-items:flex-start;gap:8px">
        <span class="r-k">나만의 인권 선언</span>
        <span class="r-v" style="text-align:left;font-weight:500;line-height:1.8">
          "${d.title}<br>${d.body.join('<br>')}"
        </span>
      </div>
    </div>
    <div class="declaration" style="margin-top:18px;text-align:center;border-color:var(--cyan)">
      <p style="font-size:17px">이제 <b style="color:var(--cyan)">현실 세계</b>에서 이어서 작성하세요.</p>
      <p style="font-size:15px;color:var(--muted);margin-top:6px">활동지의 <b>인권 보호 실천 계획서</b>를 완성해<br>시민 참여 시스템을 최종 복구하세요.</p>
    </div>
    <div class="cta-row">
      <button class="btn ghost" id="again">↻ 다시 플레이</button>
      <button class="btn" id="end">■ LAW OS 종료</button>
    </div>
    <p class="hint">LAW OS SERIES · 완결 · 당신의 차례입니다</p>
  </div>`);
  document.getElementById('again').onclick = ()=>{ resetAndStart(); };
  document.getElementById('end').onclick = ()=>{
    cinematic([{head:{area:'LAW OS',title:'시스템 복구 완료'},
      img:'city_restored',
      html:`<p class="center" style="color:var(--warm);font-size:18px;margin-top:8px">LIBERTY CITY RESTORED</p>`,
      who:'LAW OS', text:'고맙습니다. 도시는 이제 당신 같은 시민들이 지킵니다. — LAW OS 종료', cta:'처음으로'}],
      ()=> sceneTitle());
  };
}

/* ===================== 시작 ===================== */
sceneBoot();
</script>
</body>
</html>
