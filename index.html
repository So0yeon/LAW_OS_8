<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAW OS 8화 — 계산할 수 없는 것</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --ink:#070A12; --ink2:#0C1120; --panel:#121A2C; --panel2:#172139;
  --cyan:#3DD6E0; --cyan-deep:#1B6F7A; --cyan-glow:rgba(61,214,224,.35);
  --amber:#FFB86B; --rose:#FF8493; --warm:#FFD27A;
  --gray:#525E76; --gray-dim:#2A3145;
  --text:#E9EEF8; --muted:#8893AC; --green:#73E2A6;
  --line:rgba(120,140,180,.16);
  --warmth:0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--ink);color:var(--text);
  font-family:'Pretendard','Space Grotesk',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.6}
.mono{font-family:'JetBrains Mono','Space Grotesk',monospace}
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.stage{width:100%;max-width:880px;margin:0 auto}

.sys-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--cyan);opacity:.85}
.tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;padding:4px 10px;border:1px solid var(--line);border-radius:999px;color:var(--muted);text-transform:uppercase}

button{font-family:inherit;cursor:pointer;color:inherit}
.btn{display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,rgba(61,214,224,.14),rgba(255,184,107,.10));
  border:1px solid rgba(61,214,224,.4);color:var(--text);
  padding:14px 26px;border-radius:14px;font-size:15px;font-weight:600;
  transition:transform .18s ease, box-shadow .25s ease, border-color .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 34px -12px var(--cyan-glow);border-color:var(--cyan)}
.btn:focus-visible{outline:2px solid var(--warm);outline-offset:3px}
.btn.ghost{background:transparent;border-color:var(--line);color:var(--muted)}
.btn.ghost:hover{border-color:var(--muted);box-shadow:none}

/* 이미지 플레이스홀더 (실제 이미지는 10곳만) */
.img-ph{position:relative;width:100%;border-radius:16px;overflow:hidden;
  background:repeating-linear-gradient(45deg,rgba(120,140,180,.04) 0 14px,transparent 14px 28px),linear-gradient(160deg,var(--panel2),var(--ink2));
  border:1px dashed rgba(120,140,180,.32);display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;color:var(--muted);aspect-ratio:16 / 9;padding:20px;gap:6px}
.img-ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.img-ph .ph-icon{font-size:30px;opacity:.5}
.img-ph .ph-key{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--cyan);opacity:.7}
.img-ph .ph-name{font-size:13px;color:var(--text);opacity:.8}

/* 디자인으로 채우는 장면 카드(이미지 대체) */
.scene-art{position:relative;width:100%;min-height:180px;border-radius:16px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;border:1px solid var(--line);
  background:radial-gradient(120% 120% at 30% 10%, rgba(61,214,224,.10), transparent 55%),
            radial-gradient(120% 120% at 80% 90%, rgba(255,184,107,.10), transparent 55%),
            linear-gradient(160deg,var(--panel2),var(--ink2))}
.scene-art .sa-emoji{font-size:54px;filter:drop-shadow(0 6px 18px rgba(0,0,0,.4))}
.scene-art .sa-cap{position:absolute;left:16px;bottom:14px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--cyan);text-transform:uppercase}

/* 화자 박스(간단) */
.speaker{margin-top:18px;padding:18px 20px;border-radius:14px;border-left:3px solid var(--line);background:rgba(255,255,255,.02)}
.speaker .who{font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:6px}
.speaker .line{font-size:17px;line-height:1.75}
.sp-chan{border-left-color:var(--rose);background:linear-gradient(90deg,rgba(255,132,147,.10),transparent)}
.sp-chan .who{color:var(--rose)}
.sp-seo{border-left-color:var(--green);background:linear-gradient(90deg,rgba(115,226,166,.10),transparent)}
.sp-seo .who{color:var(--green)}
.sp-ari{border-left-color:var(--amber);background:linear-gradient(90deg,rgba(255,184,107,.10),transparent)}
.sp-ari .who{color:var(--amber)}
.sp-narr{border-left-color:var(--line);background:transparent}
.sp-narr .line{font-size:16px;color:var(--muted);font-style:italic}

/* ===== 전송 패널 (RIA/ARI/LAW OS 화면 채움) ===== */
.xmit{position:relative;border-radius:18px;overflow:hidden;margin-top:14px;
  background:linear-gradient(165deg,rgba(8,16,28,.92),rgba(6,10,18,.96));border:1px solid var(--th,rgba(61,214,224,.42))}
.xmit::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 2px,transparent 2px 4px);
  animation:scan 9s linear infinite;opacity:.6}
.xmit .x-head{display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:12px 18px;border-bottom:1px solid var(--thb,rgba(61,214,224,.22));
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;color:var(--th,var(--cyan));text-transform:uppercase}
.xmit .x-head .dot{width:8px;height:8px;border-radius:50%;background:var(--th,var(--cyan));box-shadow:0 0 10px var(--th,var(--cyan));animation:pulse 1.6s infinite}
.xmit .x-body{display:flex;gap:20px;padding:26px 24px;align-items:flex-start}
.x-sigil{flex:0 0 auto;width:72px;height:72px;position:relative}
.x-sigil svg{width:100%;height:100%}
.x-sigil .ring{transform-origin:center;animation:spin 14s linear infinite}
.x-lines{flex:1;min-width:0}
.x-lines .rl{font-size:18.5px;line-height:1.75;margin-bottom:12px;opacity:0;transform:translateY(8px);animation:fadeUp .6s ease forwards}
.x-lines .rl:last-child{margin-bottom:0}
.x-foot{display:flex;flex-wrap:wrap;gap:14px;padding:12px 24px;border-top:1px solid var(--thb,rgba(61,214,224,.18));
  font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.12em;color:var(--muted)}
.x-foot b{color:var(--th,var(--cyan));font-weight:500}
.xmit.theme-ria{--th:var(--cyan);--thb:rgba(61,214,224,.22)}
.xmit.theme-ari{--th:var(--amber);--thb:rgba(255,184,107,.22)}
.xmit.theme-os{--th:#fff;--thb:rgba(255,255,255,.22)}
/* 크랙 */
.xmit.cracking{animation:glitch .4s ease 2}
.cracks{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3}
.cracks path{fill:none;stroke:#dff6ff;stroke-width:1.4;stroke-dasharray:900;stroke-dashoffset:900;
  filter:drop-shadow(0 0 4px var(--cyan));animation:crackdraw 1.1s ease forwards}
.xmit.healing .cracks path{animation:crackheal 1.6s ease forwards}
.err-flash{display:inline-block;font-family:'JetBrains Mono',monospace;color:var(--rose);
  letter-spacing:.2em;animation:errblink .5s steps(1) infinite}

/* 타이틀 */
.title-wrap{text-align:center;animation:fadeUp .9s ease both}
.title-wrap .ep{font-family:'JetBrains Mono',monospace;letter-spacing:.4em;color:var(--cyan);font-size:13px;margin-bottom:18px}
.title-wrap h1{font-size:clamp(38px,8vw,76px);font-weight:700;line-height:1.02;letter-spacing:-.01em;
  background:linear-gradient(120deg,#fff 20%,var(--cyan) 60%,var(--amber) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.title-wrap .sub{margin-top:18px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.18em;font-size:13px}
.title-wrap .desc{margin:26px auto 0;max-width:540px;color:var(--muted);font-size:15px;line-height:1.85}

/* 부팅 */
.term{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--cyan);line-height:2;width:100%;max-width:640px;margin:0 auto}
.term .l{opacity:0;animation:typein .5s ease forwards}
.term .warn{color:var(--rose)}.term .ok{color:var(--green)}
.cursor{display:inline-block;width:9px;height:16px;background:var(--cyan);vertical-align:-2px;animation:blink 1s steps(1) infinite}

/* 맵/시민 그리드 */
.map-hud{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.gauge{flex:1;min-width:240px}
.gauge .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.gauge .lab{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.gauge .val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:color-mix(in srgb, var(--cyan), var(--warm) calc(var(--warmth)*100%))}
.gauge .bar{height:8px;border-radius:999px;background:var(--gray-dim);overflow:hidden}
.gauge .fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--warm));transition:width 1.1s cubic-bezier(.2,.8,.2,1)}

.citymap{position:relative;width:100%;aspect-ratio:16/10;border-radius:18px;overflow:hidden;
  background:radial-gradient(120% 90% at 50% 120%, rgba(61,214,224,calc(.05 + var(--warmth)*0.05)), transparent 60%),linear-gradient(180deg,#0A1020,#070A12);
  border:1px solid var(--line);filter:saturate(calc(.22 + var(--warmth)*0.9)) brightness(calc(.82 + var(--warmth)*0.3));transition:filter 1.6s ease}
.citizen{position:absolute;width:9px;height:9px;border-radius:50%;background:var(--gray);
  transform:translate(-50%,-50%) scale(.85);transition:background .7s ease, box-shadow .7s ease, transform .7s ease}
.citizen.awake{background:var(--warm);box-shadow:0 0 10px 2px rgba(255,210,122,.7);transform:translate(-50%,-50%) scale(1.25)}
.link-line{position:absolute;height:1.5px;transform-origin:left center;background:linear-gradient(90deg,rgba(255,210,122,.9),rgba(61,214,224,.2));opacity:0;transition:opacity .9s}
.link-line.on{opacity:.65}
.region-link{position:absolute;height:2px;transform-origin:left center;background:linear-gradient(90deg,var(--warm),var(--cyan));opacity:0;box-shadow:0 0 8px rgba(255,210,122,.6);transition:opacity 1.1s}
.region-link.on{opacity:.8}
.ripple{position:absolute;border:2px solid var(--warm);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;animation:ripple 2.2s ease-out forwards}

.region-node{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:6px;
  background:rgba(10,16,32,.78);border:1px solid rgba(61,214,224,.45);padding:9px 12px;border-radius:12px;backdrop-filter:blur(3px);
  transition:transform .18s ease,border-color .2s,box-shadow .25s,background .4s;font-size:12px;white-space:nowrap}
.region-node:hover{transform:translate(-50%,-50%) scale(1.06);border-color:var(--cyan);box-shadow:0 8px 26px -10px var(--cyan-glow)}
.region-node:focus-visible{outline:2px solid var(--warm);outline-offset:2px}
.region-node .rn-ico{font-size:18px}
.region-node .rn-name{font-weight:600}
.region-node.done{border-color:var(--warm);background:rgba(255,210,122,.12)}
.region-node.done .rn-name::after{content:" ✓";color:var(--warm)}
.region-node.ignored{opacity:.55;border-style:dashed}
.region-node.lit{border-color:var(--warm);background:rgba(255,210,122,.22);box-shadow:0 0 26px 4px rgba(255,210,122,.55);transform:translate(-50%,-50%) scale(1.12)}
.float-label{position:absolute;transform:translate(-50%,-140%);font-size:12px;color:var(--warm);font-weight:600;
  background:rgba(10,16,32,.8);padding:4px 10px;border-radius:8px;border:1px solid rgba(255,210,122,.4);opacity:0;animation:floatup 2.4s ease forwards;white-space:nowrap}

/* 지역 선택지 */
.choices{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.choice{text-align:left;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;font-size:15.5px;font-weight:500;
  transition:border-color .18s,transform .14s,background .2s;display:flex;gap:12px;align-items:center}
.choice:hover{border-color:var(--cyan);transform:translateX(4px);background:var(--panel2)}
.choice:focus-visible{outline:2px solid var(--warm);outline-offset:2px}
.choice .c-ico{font-size:18px;opacity:.9}
.choice.ignore{border-style:dashed;color:var(--muted)}
.choice.ignore:hover{border-color:var(--gray)}
.rights-chip{display:inline-flex;align-items:center;gap:8px;margin-top:4px;padding:8px 14px;border-radius:10px;
  background:rgba(61,214,224,.08);border:1px solid rgba(61,214,224,.3);font-size:13px}
.rights-chip b{color:var(--cyan)}

.chain{margin-top:18px;display:flex;flex-direction:column}
.chain .step{opacity:0;transform:translateY(8px);padding:11px 0;font-size:16px;animation:fadeUp .5s ease forwards}
.chain .arrow{color:var(--warm);font-family:'JetBrains Mono',monospace;text-align:center;opacity:0;animation:fadeIn .4s ease forwards}

/* 예측 실패 */
.predict{text-align:center;padding:22px 0}
.predict .pcalc{font-family:'JetBrains Mono',monospace;color:var(--cyan);letter-spacing:.1em;font-size:14px;margin-bottom:16px}
.pnums{display:flex;gap:30px;justify-content:center;align-items:center;flex-wrap:wrap;margin:12px 0}
.pnum{display:flex;flex-direction:column;gap:6px}
.pnum .pl{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.pnum .pv{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700}
.pnum.pred .pv{color:var(--gray)}
.pnum.real .pv{color:var(--warm)}
.pfail{margin-top:14px;font-family:'JetBrains Mono',monospace;letter-spacing:.3em;color:var(--rose);font-size:18px;font-weight:700;animation:glitch .5s ease}
.glitchtext{animation:glitch .35s ease}

/* 회상 카드(디자인) */
.recap-strip{display:flex;gap:10px;overflow-x:auto;padding:8px 2px;margin-top:8px}
.recap-card{flex:0 0 138px;border-radius:14px;border:1px solid var(--line);padding:14px 12px;background:linear-gradient(160deg,var(--panel2),var(--ink2));text-align:center}
.recap-card .rc-ico{font-size:24px}
.recap-card .rc-ep{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:10px;letter-spacing:.2em;margin-top:6px}
.recap-card .rc-t{font-size:13px;margin-top:5px;font-weight:700}
.recap-card .rc-s{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}
/* 내가 한 일 카드(전체 표시, 축약 없음) */
.deed-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:10px}
.deed-card{border-radius:14px;border:1px solid rgba(255,210,122,.3);padding:16px;background:rgba(255,210,122,.06)}
.deed-card .dc-place{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--warm);text-transform:uppercase}
.deed-card .dc-act{font-size:14px;margin-top:8px;line-height:1.55;font-weight:500}

/* 통합 */
.merge{position:relative;height:200px;display:flex;align-items:center;justify-content:center;margin:14px 0}
.orb{position:absolute;width:120px;height:120px;border-radius:50%;filter:blur(6px);transition:all 1.8s cubic-bezier(.4,0,.2,1)}
.orb.cyan{background:radial-gradient(circle,var(--cyan),transparent 70%);left:24%}
.orb.amber{background:radial-gradient(circle,var(--amber),transparent 70%);left:56%}
.merge.merged .orb.cyan{left:40%;background:radial-gradient(circle,#bfe9ff,transparent 72%)}
.merge.merged .orb.amber{left:40%;background:radial-gradient(circle,#ffe6b8,transparent 72%)}
.merge .core{position:relative;z-index:2;font-family:'JetBrains Mono',monospace;letter-spacing:.4em;font-size:20px;color:#fff;opacity:0;transition:opacity 1s 1.4s}
.merge.merged .core{opacity:1}

/* 선언 / 가치 */
.value-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:18px 0}
.value-card{padding:18px 14px;border-radius:14px;border:1px solid var(--line);background:var(--panel);text-align:center;transition:all .18s}
.value-card .vc-ico{font-size:26px}
.value-card .vc-name{font-weight:700;margin-top:8px;font-size:16px}
.value-card .vc-sug{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--cyan);margin-top:6px;opacity:0}
.value-card.suggested .vc-sug{opacity:1}
.value-card:hover{border-color:var(--warm);transform:translateY(-3px)}
.value-card.sel{border-color:var(--warm);background:rgba(255,210,122,.12);box-shadow:0 0 0 1px var(--warm)}
.declaration{margin-top:6px;padding:28px;border-radius:18px;background:linear-gradient(160deg,rgba(255,210,122,.08),rgba(61,214,224,.05));border:1px solid rgba(255,210,122,.3)}
.declaration .dq{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.25em;color:var(--amber);text-transform:uppercase;margin-bottom:14px}
.declaration p{font-size:18px;line-height:1.9;margin-bottom:10px}
.declaration p.first{font-weight:700;font-size:19px}
.declaration p.deeds{font-size:15.5px;color:var(--text)}

/* 보고서 */
.report{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px}
.report .r-row{display:flex;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px solid var(--line);font-size:15px}
.report .r-row:last-child{border-bottom:none}
.report .r-k{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase}
.report .r-v{font-weight:600;text-align:right}
.report .medal{color:var(--warm)}
.report ul{margin:6px 0 0;padding-left:18px;text-align:left}
.report li{font-size:14.5px;padding:3px 0}

.scene-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.scene-head .area{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;color:var(--cyan);text-transform:uppercase}
.scene-head h2{font-size:clamp(22px,4vw,32px);font-weight:700}
.cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:26px}
.center{text-align:center}.fadein{animation:fadeUp .6s ease both}
.hint{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;margin-top:14px;text-align:center}
.gray-scene{filter:grayscale(1) brightness(.6);transition:filter 2s}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes typein{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
@keyframes blink{50%{opacity:0}}
@keyframes errblink{50%{opacity:.25}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scan{to{background-position:0 200px}}
@keyframes ripple{from{width:0;height:0;opacity:.85}to{width:340px;height:340px;opacity:0}}
@keyframes floatup{0%{opacity:0;transform:translate(-50%,-110%)}20%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-170%)}}
@keyframes crackdraw{to{stroke-dashoffset:0}}
@keyframes crackheal{from{stroke-dashoffset:0;opacity:1}to{stroke-dashoffset:-900;opacity:0}}
@keyframes glitch{0%{transform:translate(0)}20%{transform:translate(-3px,2px)}40%{transform:translate(3px,-2px)}60%{transform:translate(-2px,-1px);filter:hue-rotate(35deg)}80%{transform:translate(2px,1px)}100%{transform:translate(0)}}
@media (max-width:560px){.gauge .val{font-size:22px}.pnum .pv{font-size:38px}.region-node{font-size:11px;padding:7px 9px}.x-body{flex-direction:column}.x-sigil{width:56px;height:56px}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<div id="app"><div class="stage" id="stage"></div></div>
<script>
"use strict";

/* =====================================================================
   이미지 교체 — 정말 중요한 10곳만 placeholder를 둡니다.
   아래 IMG에 실제 이미지 URL/경로를 넣으면 자동 교체됩니다.
   예) IMG.city_restored = "images/restored.png";
   비워두면 디자인된 placeholder가 표시됩니다.

function syncCitizens(animate,stagger){

/* ===================== 전송 패널(화면을 채우는 화자) ===================== */
function sigilSVG(theme){
  const c=theme==='ari'?'var(--amber)':theme==='os'?'#fff':'var(--cyan)';
  return `<svg viewBox="0 0 100 100" aria-hidden="true">
    <circle class="ring" cx="50" cy="50" r="38" fill="none" stroke="${c}" stroke-width="1.5" stroke-dasharray="6 10" opacity=".7"/>
    <circle cx="50" cy="50" r="26" fill="none" stroke="${c}" stroke-width="1" opacity=".4"/>
    <circle cx="50" cy="50" r="6" fill="${c}"/>
    <circle cx="50" cy="50" r="13" fill="none" stroke="${c}" stroke-width="2"/>

}
// opts: {who, theme:'ria|ari|os', lines:[], head, foot, crack:true, error:true, healing}
function xmitPanel(o){
  const theme=o.theme||'ria';
  const head=o.head||(theme==='ari'?'ARI // 인간 가치 인격':theme==='os'?'LAW OS // 통합 코어':'RIA // 시스템 효율 인격');
  const linesHTML=o.lines.map((l,i)=>`<div class="rl" style="animation-delay:${0.15+i*0.55}s">${l}</div>`).join('');
  const foot=o.foot!==undefined?o.foot:(theme==='ria'
      ? `<span>STATUS: <b>${o.error?'<span class=err-flash>ERROR</span>':'ONLINE'}</b></span><span>MODE: <b>EFFICIENCY</b></span><span>EMPATHY: <b>${o.error?'UNDEFINED':'0.00'}</b></span>`
      : theme==='ari'
      ? `<span>STATUS: <b>ONLINE</b></span><span>MODE: <b>HUMAN VALUE</b></span><span>EMPATHY: <b>∞</b></span>`
      : `<span>CORE: <b>UNIFIED</b></span><span>EFFICIENCY ⟷ DIGNITY</span>`);
  const cracks=o.crack?`<svg class="cracks" viewBox="0 0 400 200" preserveAspectRatio="none">
      <path d="M40,0 L120,70 L90,120 L160,200" style="animation-delay:0s"/>
      <path d="M200,0 L210,80 L170,110 L230,160 L210,200" style="animation-delay:.15s"/>
      <path d="M400,40 L300,90 L340,140 L280,200" style="animation-delay:.3s"/>
      <path d="M120,70 L210,80" style="animation-delay:.5s"/>
      <path d="M210,80 L340,140" style="animation-delay:.7s"/>
    </svg>`:'';
  return `<div class="xmit theme-${theme} ${o.crack?'cracking':''} ${o.healing?'healing':''}">
    ${cracks}
    <div class="x-head"><span><span class="dot"></span> ${head}</span><span>${o.who||(theme==='ari'?'아리':theme==='os'?'LAW OS':'리아')}</span></div>
    <div class="x-body"><div class="x-sigil">${sigilSVG(theme)}</div><div class="x-lines">${linesHTML}</div></div>
    <div class="x-foot">${foot}</div>
  </div>`;
}
function speak(who,line){const map={찬성:'sp-chan',서연:'sp-seo',아리:'sp-ari','':'sp-narr'};
  return `<div class="speaker ${map[who]||'sp-narr'}">${who?`<div class="who">${who}</div>`:''}<div class="line">${line}</div></div>`;}

/* ===================== 시네마틱 ===================== */
// step: {head:{area,title}, img, art:[emoji,cap], html, panel:{...xmitPanel}, who, text, cta}
function cinematic(steps,onDone){
  let i=0;
  function show(){
    const s=steps[i];let body='';
    if(s.head)body+=`<div class="scene-head"><div><div class="area">${s.head.area||''}</div><h2>${s.head.title||''}</h2></div></div>`;
    if(s.img)body+=imgPH(s.img);
    if(s.art)body+=art(s.art[0],s.art[1]);
    if(s.html)body+=s.html;
    if(s.panel)body+=xmitPanel(s.panel);
    if(s.text!==undefined)body+=speak(s.who||'',s.text);
    const last=i===steps.length-1;
    body+=`<div class="cta-row"><button class="btn" id="next">${last?(s.cta||'계속'):'▸ 다음'}</button></div>`;
    body+=`<div class="hint">클릭 또는 스페이스로 진행</div>`;
    set(`<div class="stage fadein">${body}</div>`);
    document.getElementById('next').onclick=adv;
    if(s.onShow)setTimeout(s.onShow,50);
  }
  function adv(){i++;if(i<steps.length)show();else{document.onkeydown=null;onDone();}}
  document.onkeydown=(e)=>{if(e.code==='Space'){e.preventDefault();const b=document.getElementById('next');if(b)b.click();}};
  show();
}

function sceneRegion(id){

    <div class="choices">${choicesHTML}</div>
  </div>`);
  document.getElementById('back').onclick=sceneMap;

}
function resolveChoice(r,c){
  const prev=state.done[r.id];
  if(prev){const pc=r.choices.find(x=>x.key===prev);
    state.participation=clamp(state.participation-(pc.ignore?IGNORE_GAIN:ACTION_GAIN));
    state.actionsLog=state.actionsLog.filter(a=>a.region!==r.id);
    if(pc.value)state.values[pc.value]=Math.max(0,state.values[pc.value]-1);}
  state.done[r.id]=c.key;
  if(!state.order.includes(r.id))state.order.push(r.id);
  state.participation=clamp(state.participation+(c.ignore?IGNORE_GAIN:ACTION_GAIN));
  if(!c.ignore){if(c.value)state.values[c.value]++;state.actionsLog.push({region:r.name,label:c.label,deed:c.deed,value:c.value});}
  setWarmth();
  let chainHTML='';
  c.chain.forEach((s,i)=>{if(i>0)chainHTML+=`<div class="arrow" style="animation-delay:${i*0.75-0.25}s">↓</div>`;chainHTML+=`<div class="step" style="animation-delay:${i*0.75}s">${s}</div>`;});
  const gain=c.ignore?IGNORE_GAIN:ACTION_GAIN;
  set(`<div class="stage fadein">
    <div class="scene-head"><div><div class="area">${r.area}</div><h2>${r.icon} ${r.name}</h2></div></div>
    ${c.ignore?art('🌫','아무 일도 일어나지 않음'):art('🤝','한 사람의 행동이 옆 사람에게')}
    <div class="chain">${chainHTML}</div>
    <div id="rcta" style="opacity:0"></div>
  </div>`);
  const totalDelay=c.chain.length*750+450;
  setTimeout(()=>{
    let extra;
    if(c.ignore){extra=xmitPanel({theme:'ria',lines:['보십시오. 아무 일도 일어나지 않았습니다.','예상대로입니다.']});}
    else{extra=`<div class="speaker sp-ari"><div class="who">연대</div><div class="line">시민 참여율 <b style="color:var(--warm)">+${gain}%</b> → 현재 <b style="color:var(--warm)">${state.participation}%</b>. 한 사람이 당신을 보고 따라 움직였습니다.</div></div>`;}
    document.getElementById('rcta').outerHTML=`${extra}<div class="cta-row fadein"><button class="btn" id="toMap">▸ 지도로 돌아가기</button></div>`;
    document.getElementById('toMap').onclick=sceneMap;
  },totalDelay);
}

  // 장소를 하나씩 천천히 점등 + 연결선
  seq.forEach((id,idx)=>{
    setTimeout(()=>{
      lightRegion(id,labels[id]);
      if(idx>0) drawRegionLink(seq[idx-1],id);
      if(narr[idx]&&idx<narr.length){
        document.getElementById('fnarr').innerHTML=speak('',narr[idx]);
      }
    }, t + 1100 + idx*1700);
  });
  // 마지막 연결: 루프 닫기 + 시민 연대선 + 참여율 상승
  const closeAt=t+1100+seq.length*1700;
  setTimeout(()=>{
    drawRegionLink(seq[seq.length-1],seq[0]);
    state.participation=after;setWarmth();ff.style.width=after+'%';syncCitizens(true,150);drawCitizenLinks();
    let cur=before;const up=setInterval(()=>{cur++;if(cur>=after){cur=after;clearInterval(up);}fv.textContent=cur+'%';},90);
    document.getElementById('fnarr').innerHTML=speak('',after>=WIN?'도시 전체가 함께 빛난다.':'도시는 아직, 충분히 깨어나지 못했다.');
  },closeAt);
  setTimeout(()=>{document.getElementById('fcta').style.opacity='1';},closeAt+1800);

  document.getElementById('fnext').onclick=()=>{state.participation>=WIN?sceneEndingTrue():sceneEndingBad();};
}
function lightRegion(id,label){
  const node=stage.querySelector(`.region-node[data-region="${id}"]`);if(node)node.classList.add('lit');
  rippleAt(id);
  const r=REGIONS.find(x=>x.id===id);const map=stage.querySelector('#citymap');
  if(r&&map&&label){const fl=document.createElement('div');fl.className='float-label';fl.style.left=r.pos.x+'%';fl.style.top=r.pos.y+'%';fl.textContent=label;map.appendChild(fl);setTimeout(()=>fl.remove(),2400);}
}
function drawRegionLink(aId,bId){
  const map=stage.querySelector('#citymap');if(!map)return;
  const a=REGIONS.find(x=>x.id===aId).pos,b=REGIONS.find(x=>x.id===bId).pos;
  const W=map.clientWidth,H=map.clientHeight;
  const dx=(b.x-a.x)/100*W,dy=(b.y-a.y)/100*H;const len=Math.hypot(dx,dy),ang=Math.atan2(dy,dx)*180/Math.PI;
  const line=document.createElement('div');line.className='region-link';line.style.left=a.x+'%';line.style.top=a.y+'%';line.style.width=len+'px';line.style.transform=`rotate(${ang}deg)`;
  map.appendChild(line);setTimeout(()=>line.classList.add('on'),60);
}
function drawCitizenLinks(){
  const map=stage.querySelector('#citymap');if(!map)return;
  const awake=[...stage.querySelectorAll('.citizen.awake')];const W=map.clientWidth,H=map.clientHeight;
  for(let i=0;i<Math.min(awake.length-1,18);i++){
    const a=CITIZENS[+awake[i].dataset.ci],b=CITIZENS[+awake[i+1].dataset.ci];if(!a||!b)continue;
    const dx=(b.x-a.x)/100*W,dy=(b.y-a.y)/100*H;const len=Math.hypot(dx,dy),ang=Math.atan2(dy,dx)*180/Math.PI;
    const line=document.createElement('div');line.className='link-line';line.style.left=a.x+'%';line.style.top=a.y+'%';line.style.width=len+'px';line.style.transform=`rotate(${ang}deg)`;
    map.appendChild(line);setTimeout(()=>line.classList.add('on'),300+i*150);
  }
}

/* ===================== 나만의 인권 선언 (가치별로 달라짐) ===================== */
function suggestedValue(){let best=null,max=-1;for(const k in state.values){if(state.values[k]>max){max=state.values[k];best=k;}}return max>0?best:null;}
function sceneDeclaration(){
  document.onkeydown=null;
  const sug=suggestedValue();
  const cards=Object.keys(VALUES).map(k=>`<button class="value-card ${k===sug?'suggested':''}" data-v="${k}"><div class="vc-ico">${VALUES[k].ico}</div><div class="vc-name">${k}</div><div class="vc-sug">당신의 행동과 가장 닮음</div></button>`).join('');
  set(`<div class="stage fadein">
    <div class="scene-head"><div><div class="area">CITIZEN DECLARATION</div><h2>나만의 인권 선언</h2></div></div>
    ${speak('아리','당신의 선택들이 선언문이 되었어요. 마지막으로, 당신이 가장 소중히 여기는 가치를 하나 골라 주세요. 고른 가치에 따라 선언문이 달라져요.')}
    <div class="value-grid">${cards}</div>
    <div id="declBox"></div>
  </div>`);
  stage.querySelectorAll('.value-card').forEach(b=>b.onclick=()=>{
    stage.querySelectorAll('.value-card').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');state.chosenValue=b.dataset.v;renderDeclaration();});
}
function buildDeclaration(){
  const v=state.chosenValue; const vd=v?VALUES[v]:null;
  const deeds=state.actionsLog.map(a=>a.deed).filter(Boolean);
  // 행동 문장: 마지막만 '~했습니다' 형태가 되도록 deed는 '~했고' 형으로 저장됨
  let deedSentence='';
  if(deeds.length){
    const joined=deeds.join(' ');
    deedSentence=`리버티 시티에서 나는 ${joined} 그렇게 도시를 조금 바꾸었습니다.`;
  }
  return {
    title:'나, 리버티 시티의 한 시민은 선언합니다.',
    open: vd?vd.open:'',
    deeds: deedSentence,
    pledge: vd?vd.pledge:''
  };
}
function renderDeclaration(){
  const d=buildDeclaration();
  document.getElementById('declBox').innerHTML=`
    <div class="declaration fadein">
      <div class="dq">MY HUMAN RIGHTS DECLARATION · 가치: ${state.chosenValue||'-'}</div>
      <p class="first">\u201c${d.title}</p>
      ${d.open?`<p>${d.open}</p>`:''}
      ${d.deeds?`<p class="deeds">${d.deeds}</p>`:''}
      ${d.pledge?`<p>${d.pledge}\u201d</p>`:''}
    </div>
    <div class="cta-row"><button class="btn" id="toReport">▸ LAW OS 최종 보고서 받기</button></div>`;
  document.getElementById('toReport').onclick=sceneReport;
  document.getElementById('declBox').scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ===================== 최종 보고서 ===================== */
function medal(){const a=actionCount();return a>=5?'도시를 깨운 시민':a>=4?'행동하는 시민':'움직이기 시작한 시민';}
function elapsed(){const s=Math.floor((Date.now()-state.startTime)/1000);return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function sceneReport(){
  const d=buildDeclaration();

  set(`<div class="stage fadein">

      <div class="r-row"><span class="r-k">획득 칭호</span><span class="r-v medal">🏅 ${medal()}</span></div>

      <div class="r-row" style="flex-direction:column;align-items:flex-start;gap:8px"><span class="r-k">나만의 인권 선언</span>
        <span class="r-v" style="text-align:left;font-weight:500;line-height:1.85">\u201c${d.title}<br>${[d.open,d.deeds,d.pledge].filter(Boolean).join('<br>')}\u201d</span></div>
    </div>
    <div class="declaration" style="margin-top:18px;text-align:center;border-color:var(--cyan)">
      <p style="font-size:17px">이제 <b style="color:var(--cyan)">현실 세계</b>에서 이어서 작성하세요.</p>
      <p style="font-size:15px;color:var(--muted);margin-top:6px">활동지의 <b>인권 보호 실천 계획서</b>를 완성해<br>시민 참여 시스템을 최종 복구하세요.</p>
    </div>
    <div class="cta-row"><button class="btn ghost" id="again">↻ 다시 플레이</button><button class="btn" id="end">■ LAW OS 종료</button></div>
    <p class="hint">LAW OS SERIES · 완결 · 이제 당신의 차례입니다</p>
  </div>`);
  document.getElementById('again').onclick=resetAndStart;
  document.getElementById('end').onclick=()=>cinematic([{head:{area:'LAW OS',title:'시스템 복구 완료'},img:'city_restored',
    html:`<p class="center" style="color:var(--warm);font-size:18px;margin-top:8px">LIBERTY CITY RESTORED</p>`,
    panel:{theme:'os',lines:['고맙습니다. 도시는 이제 당신 같은 시민들이 지킵니다.','— LAW OS, 종료합니다.']},cta:'처음으로'}],sceneTitle);
}
